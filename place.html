<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="This is a webpage dedicated to the beautiful place in Nigeria called Lagos. It is home to the best view in the world.">
    <meta name="author" content="Samuel Akibon">
    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">
    <script src="scripts/place.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Yuyu+Short&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Yuyu+Short&display=swap" rel="stylesheet">
    <title>Beautiful Lagos</title>
</head>
<body>
    <header>
        <h1 class="heading"> Lagos </h1>
    </header>
    <!-- A solid, thick horizontal line -->
    <hr>

    <main>
        <div class="hero">
            <picture>
                <source srcset="images/hero-large.webp" media="(min-width: 1000px)">
                <source srcset="images/hero-medium.webp" media="(min-width: 500px)">
                <img src="images/hero-small.webp" alt="Temple name and location" width="500" height="250" loading="lazy">
            </picture>
        

        </div>
        <hr style="height: 10px; background-color: #00A86B; border: none;">
        <aside class="data">
            <div class="aside-heading"><h2>Data</h2></div>
            <p><b>Area:</b> 923,769 km²</p>
            <p><b>Population:</b> 249,804,632</p>
            <p><b>Capital:</b> Ikeja</p>
            <p><b>Languages: </b>English</p>
            <p><b>Currency: </b>Nigeria Naira (₦)</p>
            <p><b>Time Zone: </b>UTC +1</p>
            <p><b>Calling Code:</b> +234</p>
            <p><b>Internet TLD:</b> .ng</p>
        </aside>
        



        <aside class="weather">
            <div class="aside-heading weather-img"><h2>Weather</h2>
            <img src="images/weather.svg" alt="Weather Image"> </div>
            <p><b>Temperature:</b>  <span id="temp"></span></p>
            <p><b>Conditions:</b> Very Cold</p>
            <p><b>Wind: </b> <span id="wind"></span></p>
            <p><b>Wind Chill: </b> <span id="windChill"></span></p> 
                    
        </aside>
    </main>

     <footer>
         <div class="first">
        <p>©️<span id="currentyear"></span> 🪽Samuel Akibon🪽 Nigeria</p>
        </div>
        <p><span id="lastModified"></span></p>
    </footer>
    
</body>
</html>
